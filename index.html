<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spotify Style Player</title>

<style>
body {
    margin: 0;
    background: #121212;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Player Card */
.player {
    background: #181818;
    padding: 25px;
    border-radius: 15px;
    width: 320px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    text-align: center;
}

/* Title */
.title {
    font-size: 18px;
    margin-bottom: 10px;
}

/* Controls */
.controls button {
    background: #1db954;
    border: none;
    color: white;
    font-size: 16px;
    margin: 10px;
    padding: 10px 15px;
    border-radius: 50px;
    cursor: pointer;
}

.controls button:hover {
    background: #1ed760;
}

/* Progress Bar */
.progress {
    width: 100%;
}

.time {
    font-size: 12px;
    color: #b3b3b3;
}

/* Volume */
.volume {
    width: 100%;
}

/* Extra buttons */
.extra button {
    background: transparent;
    border: 1px solid #1db954;
    color: #1db954;
    padding: 6px 10px;
    border-radius: 20px;
    margin: 5px;
    cursor: pointer;
}

.extra button:hover {
    background: #1db954;
    color: white;
}
</style>

</head>
<body>

<div class="player">

    <div class="title">🎵 Now Playing</div>

    <!-- Audio -->
    <audio id="audio" src="audio.mp3"></audio>

    <!-- Progress -->
    <input type="range" id="progress" class="progress" value="0">

    <div class="time">
        <span id="current">0:00</span> / <span id="duration">0:00</span>
    </div>

    <!-- Controls -->
    <div class="controls">
        <button onclick="skip(-5)">⏮</button>
        <button onclick="togglePlay()" id="playBtn">▶</button>
        <button onclick="skip(5)">⏭</button>
    </div>

    <!-- Volume -->
    <input type="range" min="0" max="1" step="0.1" class="volume" onchange="setVolume(this.value)">

    <!-- Extra -->
    <div class="extra">
        <button onclick="toggleMute()">🔇 Mute</button>
        <button onclick="toggleLoop()">🔁 Loop</button>
    </div>

</div>

<script>
const audio = document.getElementById("audio");
const playBtn = document.getElementById("playBtn");
const progress = document.getElementById("progress");
const current = document.getElementById("current");
const duration = document.getElementById("duration");

// Play / Pause Toggle
function togglePlay() {
    if (audio.paused) {
        audio.play();
        playBtn.textContent = "⏸";
    } else {
        audio.pause();
        playBtn.textContent = "▶";
    }
}

// Volume
function setVolume(value) {
    audio.volume = value;
}

// Skip
function skip(seconds) {
    audio.currentTime += seconds;
}

// Mute
function toggleMute() {
    audio.muted = !audio.muted;
}

// Loop
function toggleLoop() {
    audio.loop = !audio.loop;
}

// Update progress bar
audio.addEventListener("timeupdate", () => {
    progress.value = (audio.currentTime / audio.duration) * 100;

    current.textContent = formatTime(audio.currentTime);
});

// Set duration when loaded
audio.addEventListener("loadedmetadata", () => {
    duration.textContent = formatTime(audio.duration);
});

// Seek
progress.addEventListener("input", () => {
    audio.currentTime = (progress.value / 100) * audio.duration;
});

// Format time
function formatTime(time) {
    let mins = Math.floor(time / 60);
    let secs = Math.floor(time % 60);
    if (secs < 10) secs = "0" + secs;
    return mins + ":" + secs;
}

// Keyboard controls (extra creativity)
document.addEventListener("keydown", (e) => {
    if (e.code === "Space") togglePlay();
});
</script>

</body>
</html>
